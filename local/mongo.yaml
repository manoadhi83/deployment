apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-app
  labels:
    type: mongo-deployment-type
    app: food-delivery-app
spec:
  serviceName: "mongo-service"
  replicas: 1
  selector:
    matchLabels:
      type: mongo-pod-type
      app: food-delivery-app
  template:
    metadata:
      labels:
        type: mongo-pod-type
        app: food-delivery-app
    spec:
      containers:
        - name: mongo-container
          image: mongo:6.0.8
          imagePullPolicy: Always
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: root
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: food-app-vault
                  key: mongo-root-password
          ports:
            - containerPort: 27017
              name: mongo
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  labels:
    type: mongo-service-type
    app: food-delivery-app
spec:
  clusterIP: None   # headless service for StatefulSet
  ports:
    - port: 27017
      targetPort: 27017
  selector:
    type: mongo-pod-type
    app: food-delivery-app