apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-app
  labels:
    type: ui-deployment-type
    app: food-delivery-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: food-delivery-app
      type: ui-pod-type
  template:
    metadata:
      labels:
        app: food-delivery-app
        type: ui-pod-type
    spec:
      containers:
        - name: ui-container
          image: manoadhi/food-delivery-app:0.0.2
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ui-service
  labels:
    type: ui-service
    app: food-delivery-app
spec:
  type: NodePort  # Minikube
  selector:
    app: food-delivery-app
    type: ui-pod-type
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30001